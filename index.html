    <style>
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #f1f5f9; /* 稍微深一点的灰色，模拟桌面背景 */

            margin: 0;
            padding: 0;
        }
        .app-container {
            max-width: 450px; /* 标准手机宽度模拟 */
            margin: 0 auto;
            background-color: #fcfaff; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        /* 隐藏滚动条 */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        .view {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px; /* 增加底部填充，确保内容不被遮挡 */
        }
        .view.active {
            display: flex !important; /* 改为 flex 布局以更好地控制子元素 */
            flex-direction: column;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .nav-item.active {
            color: #8b5cf6;
        }
        .nav-item.active i {
            transform: translateY(-2px);
            transition: transform 0.2s ease;
        }
        /* 卡片翻转动画 */
        .perspective-1000 {
            perspective: 1000px;
        }
        .flashcard {
            height: 400px; /* 给卡片一个固定高度，防止绝对定位导致塌陷 */
            width: 100%;
            position: relative;
        }
        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 1.5rem;
            top: 0;
            left: 0;
        }
        .flashcard-back {
            transform: rotateY(180deg);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

    <script>
        // --- 状态与数据管理 ---
        let db = JSON.parse(localStorage.getItem('kaogong_db')) || [];
        let isLoggedIn = localStorage.getItem('kaogong_is_logged_in') === 'true';
        let currentAddType = 'word';
        let currentGeneratedCard = null;
        let currentFilter = 'all';
        
        // 复习状态
        let reviewQueue = [];
        let currentReviewIndex = 0;

        // --- 初始化 ---
        window.onload = () => {
            updateStats();
            updateLoginUI();
            // 如果为了演示体验，初始化一些假数据
            if(db.length === 0) {
                initMockData();
            }
            // 确保初始视图同步
            switchTab('home');

            // 注册 Service Worker (PWA)
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('sw.js').then(reg => {
                        console.log('SW registered');
                    }).catch(err => {
                        console.log('SW registration failed', err);
                    });
                });
            }
        }

        function updateLoginUI() {
            const loggedOutEl = document.getElementById('profile-logged-out');
            const loggedInEl = document.getElementById('profile-logged-in');
            
            if (isLoggedIn) {
                if (loggedOutEl) loggedOutEl.classList.add('hidden');
                if (loggedInEl) loggedInEl.classList.remove('hidden');
            } else {
                if (loggedOutEl) loggedOutEl.classList.remove('hidden');
                if (loggedInEl) loggedInEl.classList.add('hidden');
            }
        }

        function handleLogin(method = '账号') {
            // 模拟登录
            isLoggedIn = true;
            localStorage.setItem('kaogong_is_logged_in', 'true');
            updateLoginUI();
            alert(method + '登录成功！');
        }

        function handleLogout() {
            isLoggedIn = false;
            localStorage.setItem('kaogong_is_logged_in', 'false');
            updateLoginUI();
        }

        // --- 数据备份功能 ---
        function exportData() {
            const dataStr = JSON.stringify(db);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = 'kaogong_backup_' + new Date().toISOString().slice(0,10) + '.json';
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.readAsText(file,'UTF-8');
                reader.onload = readerEvent => {
                    try {
                        const content = JSON.parse(readerEvent.target.result);
                        if (Array.isArray(content)) {
                            if (confirm('导入将覆盖当前所有积累，确定吗？')) {
                                db = content;
                                saveDb();
                                alert('导入成功！');
                                location.reload();
                            }
                        } else {
                            alert('无效的备份文件');
                        }
                    } catch (err) {
                        alert('读取文件出错');
                    }
                }
            }
            input.click();
        }

        function initMockData() {
            db = [
                {
                    id: 1, type: "word", title: "南辕北辙", tag: "言语理解 · 成语",
                    content: {
                        summary: "行动和目的相反，越做越偏。",
                        usage: "多用于批评政策执行、工作方法、治理举措与初衷不一致。",
                        example: "若只追求短期数据增长而忽视长效治理，往往会使改革目标与执行路径南辕北辙。",
                        error: "易与“背道而驰”混淆，后者更强调方向完全相反；南辕北辙强调目的与行动错位。",
                        tip: "想去南方却往北走。"
                    },
                    level: 0, nextReview: Date.now() - 1000 // 需要复习
                },
                {
                    id: 2, type: "common", title: "行政处罚", tag: "常识判断 · 法律",
                    content: {
                        summary: "行政机关依法对违反行政管理秩序的公民、法人或其他组织作出的惩戒。",
                        points: "种类包括：警告、通报批评；罚款、没收违法所得；暂扣许可证件、降低资质等级；限制开展生产经营活动；行政拘留等。",
                        error: "行政处分针对公职人员（内部）；行政处罚针对违法相对人（外部）。",
                        example: "常见考法：“下列属于行政处罚的是？” -> 答案选“某局对企业罚款5万元”。",
                        tip: "对外罚老百姓/企业的叫处罚，对内罚干部的叫处分。"
                    },
                    level: 1, nextReview: Date.now() - 1000 // 需要复习
                }
            ];
            saveDb();
            updateStats();
        }

        function saveDb() {
            localStorage.setItem('kaogong_db', JSON.stringify(db));
            updateStats();
        }

        function clearData() {
            if(confirm('确定要清空所有积累的数据吗？不可恢复！')) {
                db = [];
                saveDb();
                alert('已清空');
                if(document.getElementById('view-library').classList.contains('active')) renderLibrary();
            }
        }

        // --- 视图路由 ---
        function switchTab(tabId, subType = null) {
            // 隐藏所有视图
            document.querySelectorAll('.view').forEach(el => {
                el.classList.remove('active');
                el.style.display = 'none'; // 强制隐藏
            });
            // 移除导航高亮
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active', 'text-primary-600');
                el.classList.add('text-gray-300');
            });
            
            // 激活当前
            const activeView = document.getElementById('view-' + tabId);
            if (activeView) {
                activeView.classList.add('active');
                activeView.style.display = 'block'; // 强制显示
            }
            
            const activeNav = document.getElementById('nav-' + tabId);
            if (activeNav) {
                activeNav.classList.add('active', 'text-primary-600');
                activeNav.classList.remove('text-gray-300');
            }

            // 处理顶部个人按钮高亮
            const btnProfile = document.getElementById('btn-profile');
            if (tabId === 'profile') {
                btnProfile.classList.add('text-primary-500');
                btnProfile.classList.remove('text-gray-400');
            } else {
                btnProfile.classList.add('text-gray-400');
                btnProfile.classList.remove('text-primary-500');
            }

            // 动态标题
            const titles = { 'home': '公考积累', 'add': '新增卡片', 'library': '我的词库', 'review': '卡片复习', 'profile': '个人中心' };
            if (document.getElementById('header-title')) {
                document.getElementById('header-title').innerText = titles[tabId];
            }

            if (tabId === 'add') {
                if(subType) setAddType(subType);
            } else if (tabId === 'library') {
                renderLibrary();
            } else if (tabId === 'review') {
                startReview();
            } else if (tabId === 'home') {
                updateStats();
            }
        }

        function updateStats() {
            const now = Date.now();
            const total = db.length;
            const reviewCount = db.filter(item => item.nextReview <= now).length;
            const mastered = db.filter(item => item.level >= 3).length;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-review').innerText = reviewCount;
            document.getElementById('stat-mastered').innerText = mastered;

            const badge = document.getElementById('nav-badge');
            if (badge) {
                if (reviewCount > 0) {
                    badge.innerText = reviewCount > 99 ? '99+' : reviewCount;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }
        }

        // --- 录入模块 ---
        function setAddType(type) {
            currentAddType = type;
            const btnWord = document.getElementById('tab-type-word');
            const btnCommon = document.getElementById('tab-type-common');
            
            if (type === 'word') {
                btnWord.className = "flex-1 py-2.5 text-xs font-bold rounded-xl transition-all shadow-sm bg-white text-primary-600";
                btnCommon.className = "flex-1 py-2.5 text-xs font-bold rounded-xl transition-all text-gray-400";
            } else {
                btnCommon.className = "flex-1 py-2.5 text-xs font-bold rounded-xl transition-all shadow-sm bg-white text-primary-600";
                btnWord.className = "flex-1 py-2.5 text-xs font-bold rounded-xl transition-all text-gray-400";
            }
            
            // 隐藏之前的预览
            const previewArea = document.getElementById('preview-area');
            if (previewArea) previewArea.classList.add('hidden');
        }

        async function generateCard() {
            const term = document.getElementById('input-term').value.trim();
            if (!term) return alert('请输入内容');

            // 检查重复
            if(db.find(i => i.title === term && i.type === currentAddType)) {
                return alert('该词条已在词库中！');
            }

            // 显示加载
            document.getElementById('btn-generate').disabled = true;
            document.getElementById('btn-generate').innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            document.getElementById('preview-area').classList.add('hidden');
            document.getElementById('loading-area').classList.remove('hidden');

            // 模拟 AI 请求延迟 (真实场景替换为 fetch 调用大模型 API)
            await new Promise(resolve => setTimeout(resolve, 1500));

            // 模拟 AI 返回结果
            let aiResult = getMockAiResponse(term, currentAddType);
            currentGeneratedCard = aiResult;

            // 渲染预览
            renderPreview(aiResult);

            // 恢复 UI
            document.getElementById('loading-area').classList.add('hidden');
            document.getElementById('preview-area').classList.remove('hidden');
            document.getElementById('btn-generate').disabled = false;
            document.getElementById('btn-generate').innerHTML = '<i class="fas fa-magic"></i> AI 生成';
        }

        function renderPreview(data) {
            document.getElementById('preview-title').innerText = data.title;
            document.getElementById('preview-tag').innerText = data.tag;
            
            let html = '';
            if (data.type === 'word') {
                html = `
                    <div class="space-y-1"><span class="text-[10px] font-bold text-primary-400 uppercase tracking-wider">释义</span><p class="text-gray-700">${data.content.summary}</p></div>
                    <div class="space-y-1"><span class="text-[10px] font-bold text-primary-400 uppercase tracking-wider">语境</span><p class="text-gray-700">${data.content.usage}</p></div>
                    <div class="p-4 bg-primary-50 rounded-2xl border border-primary-100/50"><span class="text-[10px] font-bold text-primary-500 uppercase mb-2 block">真题例句</span><p class="text-primary-900 font-medium italic">“${data.content.example}”</p></div>
                    <div class="flex gap-4">
                        <div class="flex-1"><span class="text-[10px] font-bold text-accent-error uppercase block mb-1">易错</span><p class="text-xs text-gray-500">${data.content.error}</p></div>
                        <div class="flex-1"><span class="text-[10px] font-bold text-accent-success uppercase block mb-1">记忆</span><p class="text-xs text-gray-500">${data.content.tip}</p></div>
                    </div>
                `;
            } else {
                html = `
                    <div class="space-y-1"><span class="text-[10px] font-bold text-primary-400 uppercase tracking-wider">概念</span><p class="text-gray-700">${data.content.summary}</p></div>
                    <div class="space-y-1"><span class="text-[10px] font-bold text-primary-400 uppercase tracking-wider">核心考点</span><p class="text-gray-700">${data.content.points}</p></div>
                    <div class="p-4 bg-primary-50 rounded-2xl border border-primary-100/50"><span class="text-[10px] font-bold text-primary-500 uppercase mb-2 block">出题方式</span><p class="text-primary-900 font-medium">${data.content.example}</p></div>
                    <div class="flex gap-4">
                        <div class="flex-1"><span class="text-[10px] font-bold text-accent-error uppercase block mb-1">陷阱</span><p class="text-xs text-gray-500">${data.content.error}</p></div>
                        <div class="flex-1"><span class="text-[10px] font-bold text-accent-success uppercase block mb-1">口诀</span><p class="text-xs text-gray-500">${data.content.tip}</p></div>
                    </div>
                `;
            }
            document.getElementById('preview-content').innerHTML = html;
        }

        function saveCard() {
            if (!currentGeneratedCard) return;
            
            // 组装最终存入的数据
            const newCard = {
                id: Date.now(),
                ...currentGeneratedCard,
                level: 0, // 0: 新词, 1: 模糊, 2: 认识, 3: 掌握
                nextReview: Date.now(), // 立即进入复习队列
                createdAt: Date.now()
            };

            db.unshift(newCard); // 插在最前
            saveDb();
            
            alert('保存成功！已加入今日复习计划。');
            
            // 重置
            document.getElementById('input-term').value = '';
            document.getElementById('preview-area').classList.add('hidden');
            currentGeneratedCard = null;
        }

        // --- 模拟 AI 数据生成 ---
        function getMockAiResponse(term, type) {
            // 这里用写死的数据模拟大模型的 JSON 返回，实际开发中替换为 API 即可
            if (type === 'word') {
                return {
                    type: "word", title: term, tag: "言语理解 · 高频词",
                    content: {
                        summary: "【AI生成】" + term + " 的基本含义。比喻某种特定的状态或行为。",
                        usage: "在考公中，常用于形容政府治理、政策执行、干部作风等方面的现象。",
                        example: "面对复杂的社会矛盾，我们不能（" + term + "），而必须坚持具体问题具体分析。",
                        error: "注意与近义词的区别，本词更强调客观状态，而非主观意图。",
                        tip: "联想：XX场景下的典型表现。"
                    }
                };
            } else {
                return {
                    type: "common", title: term, tag: "常识判断 · 核心考点",
                    content: {
                        summary: "【AI生成】" + term + " 是指在特定领域内的一种制度、概念或历史事件。",
                        points: "1. 确立时间/提出者。2. 核心特征包含三点：A、B、C。3. 历史/现实意义。",
                        error: "考试中常把此概念与另一个极易混淆的概念张冠李戴，请注意区分主体和客体。",
                        example: "常考单选题：“关于" + term + "，下列说法正确/错误的是？”",
                        tip: "口诀：XX第一，YY第二。"
                    }
                };
            }
        }

        // --- 词库模块 ---
        function setLibraryFilter(filter, el) {
            currentFilter = filter;
            // 更新按钮样式
            const btns = document.getElementById('library-filters').querySelectorAll('.filter-btn');
            btns.forEach(btn => {
                btn.className = "filter-btn whitespace-nowrap px-5 py-2 rounded-xl bg-white text-gray-400 border border-primary-50 text-xs font-bold transition-all";
            });
            
            if (el) {
                el.className = "filter-btn active whitespace-nowrap px-5 py-2 rounded-xl bg-primary-500 text-white text-xs font-bold shadow-md transition-all";
            }
            
            renderLibrary();
        }

        function renderLibrary() {
            const listEl = document.getElementById('library-list');
            const keyword = document.getElementById('search-input').value.toLowerCase();
            
            let filtered = db.filter(item => {
                const matchKeyword = item.title.toLowerCase().includes(keyword) || item.content.summary.includes(keyword);
                const matchFilter = currentFilter === 'all' || item.type === currentFilter;
                return matchKeyword && matchFilter;
            });

            if (filtered.length === 0) {
                listEl.innerHTML = `<div class="text-center text-gray-300 py-16 font-medium text-xs">没有找到相关积累</div>`;
                return;
            }

            let html = '';
            filtered.forEach(item => {
                const isWord = item.type === 'word';
                const tagColor = isWord ? 'text-primary-500 bg-primary-50' : 'text-purple-500 bg-purple-50';
                
                let levelStr = "待复习";
                let levelColor = "bg-gray-100 text-gray-400";
                if(item.level === 1) { levelStr = "模糊"; levelColor = "bg-orange-50 text-orange-500"; }
                if(item.level === 2) { levelStr = "认识"; levelColor = "bg-blue-50 text-blue-500"; }
                if(item.level >= 3) { levelStr = "已掌握"; levelColor = "bg-green-50 text-accent-success"; }

                html += `
                <div class="bg-white rounded-3xl p-5 shadow-soft border border-primary-50/50 active:scale-[0.99] transition-all">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-3">
                            <h4 class="font-bold text-gray-900">${item.title}</h4>
                            <span class="text-[9px] font-bold px-2 py-0.5 rounded-md ${tagColor}">${isWord ? '言语' : '常识'}</span>
                        </div>
                        <span class="text-[9px] font-bold px-2 py-1 rounded-full ${levelColor}">${levelStr}</span>
                    </div>
                    <p class="text-xs text-gray-400 line-clamp-2 leading-relaxed">${item.content.summary}</p>
                </div>
                `;
            });
            listEl.innerHTML = html;
        }

        // --- 复习模块 ---
        function startReview() {
            const now = Date.now();
            // 筛选出需要复习的卡片
            reviewQueue = db.filter(item => item.nextReview <= now);
            
            // 如果为了演示，每次至少复习2个，不管时间
            if (reviewQueue.length === 0 && db.length > 0) {
                reviewQueue = [...db].sort(() => 0.5 - Math.random()).slice(0, Math.min(db.length, 5));
            }

            currentReviewIndex = 0;
            renderReviewCard();
        }

        function renderReviewCard() {
            const emptyEl = document.getElementById('review-empty');
            const containerEl = document.getElementById('review-card-container');
            const cardEl = document.getElementById('flashcard');
            const actionsEl = document.getElementById('review-actions');
            
            // 重置卡片状态
            cardEl.classList.remove('flipped');
            actionsEl.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');

            if (currentReviewIndex >= reviewQueue.length || reviewQueue.length === 0) {
                emptyEl.classList.remove('hidden');
                containerEl.classList.add('hidden');
                return;
            }

            emptyEl.classList.add('hidden');
            containerEl.classList.remove('hidden');

            const item = reviewQueue[currentReviewIndex];
            
            document.getElementById('review-progress').innerText = `${currentReviewIndex + 1} / ${reviewQueue.length}`;
            
            // 渲染正面
            document.getElementById('fc-title').innerText = item.title;
            document.getElementById('fc-tag').innerText = item.tag;

            // 渲染背面
            document.getElementById('fc-back-title').innerText = item.title;
            let backHtml = '';
            if (item.type === 'word') {
                backHtml = `
                    <div class="space-y-4">
                        <div class="space-y-1"><span class="text-[10px] font-bold text-primary-400 uppercase tracking-wider">核心释义</span><p class="text-gray-700">${item.content.summary}</p></div>
                        <div class="p-4 bg-primary-50 rounded-2xl border border-primary-100/50"><span class="text-[10px] font-bold text-primary-500 uppercase mb-2 block">语境例句</span><p class="text-primary-900 font-medium italic">“${item.content.example}”</p></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-red-50/50 p-3 rounded-xl"><span class="text-[9px] font-bold text-accent-error uppercase block mb-1">易错辨析</span><p class="text-[11px] text-gray-500 leading-snug">${item.content.error}</p></div>
                            <div class="bg-green-50/50 p-3 rounded-xl"><span class="text-[9px] font-bold text-accent-success uppercase block mb-1">记忆点</span><p class="text-[11px] text-gray-500 leading-snug">${item.content.tip}</p></div>
                        </div>
                    </div>
                `;
            } else {
                backHtml = `
                    <div class="space-y-4">
                        <div class="space-y-1"><span class="text-[10px] font-bold text-primary-400 uppercase tracking-wider">知识背景</span><p class="text-gray-700">${item.content.summary}</p></div>
                        <div class="space-y-1"><span class="text-[10px] font-bold text-primary-400 uppercase tracking-wider">核心考点</span><p class="text-gray-700 text-xs">${item.content.points}</p></div>
                        <div class="p-4 bg-primary-50 rounded-2xl border border-primary-100/50"><span class="text-[10px] font-bold text-primary-500 uppercase mb-2 block">典型考法</span><p class="text-primary-900 font-medium text-xs">${item.content.example}</p></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-red-50/50 p-3 rounded-xl"><span class="text-[9px] font-bold text-accent-error uppercase block mb-1">常识陷阱</span><p class="text-[11px] text-gray-500 leading-snug">${item.content.error}</p></div>
                            <div class="bg-green-50/50 p-3 rounded-xl"><span class="text-[9px] font-bold text-accent-success uppercase block mb-1">秒杀口诀</span><p class="text-[11px] text-gray-500 leading-snug">${item.content.tip}</p></div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('fc-back-content').innerHTML = backHtml;
        }

        function flipCard() {
            const cardEl = document.getElementById('flashcard');
            const actionsEl = document.getElementById('review-actions');
            if (!cardEl.classList.contains('flipped')) {
                cardEl.classList.add('flipped');
                // 激活底部按钮
                actionsEl.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
            }
        }

        function submitReview(quality) {
            // quality: 0(不会), 1(模糊), 2(掌握)
            const item = reviewQueue[currentReviewIndex];
            
            // 简化的间隔重复算法
            const HOUR = 60 * 60 * 1000;
            const DAY = 24 * HOUR;

            if (quality === 0) {
                item.level = Math.max(0, item.level - 1);
                item.nextReview = Date.now() + 1 * HOUR; // 1小时后再次复习
            } else if (quality === 1) {
                item.level = Math.max(1, item.level);
                item.nextReview = Date.now() + 12 * HOUR; // 半天后复习
            } else if (quality === 2) {
                item.level += 1;
                // 根据级别决定下次复习时间
                let interval = 1 * DAY;
                if (item.level === 2) interval = 3 * DAY;
                if (item.level === 3) interval = 7 * DAY;
                if (item.level > 3) interval = 15 * DAY;
                item.nextReview = Date.now() + interval;
            }

            // 更新到总库
            const dbIndex = db.findIndex(i => i.id === item.id);
            if(dbIndex > -1) {
                db[dbIndex] = item;
                saveDb();
            }

            // 下一张
            currentReviewIndex++;
            renderReviewCard();
        }

    </script>
